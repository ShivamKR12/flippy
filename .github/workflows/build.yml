name: Build Windows Executable

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame-ce pyinstaller

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --clean --noconfirm flippy.spec

      - name: Decode signing certificate
        run: |
          echo "${{ secrets.WINDOWS_CERTIFICATE }}" > cert.txt
          certutil -decode cert.txt flippy.pfx

      - name: Sign EXE
        run: |
          signtool sign /f flippy.pfx /p ${{ secrets.CERT_PASSWORD }} /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 dist/flippy.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Flippy v${{ github.run_number }}
          files: dist/flippy.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}