name: Build Windows Executable

on:
  [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    if: github.event_name != 'push' || (!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame-ce pyinstaller

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --clean --noconfirm flippy.spec

      - name: Decode signing certificate
        run: |
          echo "${{ secrets.WINDOWS_CERTIFICATE }}" > cert.txt
          certutil -decode cert.txt flippy.pfx

      - name: Locate signtool
        id: signtool
        shell: powershell
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Select-Object -First 1
          echo "path=$($signtool.FullName)" >> $env:GITHUB_OUTPUT

      - name: Sign EXE
        shell: powershell
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Select-Object -First 1
          & $signtool.FullName sign `
            /f flippy.pfx `
            /p ${{ secrets.CERT_PASSWORD }} `
            /fd SHA256 `
            /tr http://timestamp.digicert.com `
            /td SHA256 `
            dist\flippy.exe

      - name: Zip executable
        run: |
          Compress-Archive -Path dist\flippy.exe -DestinationPath dist\flippy.zip -Force

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Flippy v1.0.${{ github.run_number }}
          files: dist/flippy.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
